# World Models Hub - 月度自动更新工作流
# 每月1日自动运行爬虫和Kimi AI处理

name: Monthly Content Update

on:
  # 定时触发：每月1日 02:00 UTC (北京时间 10:00)
  schedule:
    - cron: '0 2 1 * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD格式，用于回溯)'
        required: false
        default: ''
      skip_crawl:
        description: '跳过爬虫阶段'
        type: boolean
        required: false
        default: false
      skip_process:
        description: '跳过AI处理阶段'
        type: boolean
        required: false
        default: false

jobs:
  update-content:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. 设置Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai aiohttp feedparser
      
      # 4. 运行月度更新脚本
      - name: Run monthly update
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 构建命令参数
          CMD="python src/scripts/monthly_update.py"
          
          if [ -n "${{ github.event.inputs.date }}" ]; then
            CMD="$CMD --date ${{ github.event.inputs.date }}"
          fi
          
          if [ "${{ github.event.inputs.skip_crawl }}" == "true" ]; then
            CMD="$CMD --skip-crawl"
          fi
          
          if [ "${{ github.event.inputs.skip_process }}" == "true" ]; then
            CMD="$CMD --skip-process"
          fi
          
          echo "执行命令: $CMD"
          $CMD
      
      # 5. 检查是否有更新
      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      # 6. 提交更新
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: monthly content update - $(date +'%Y-%m-%d')"
          git push
      
      # 7. 触发网站部署（可选）
      - name: Trigger deployment
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "内容已更新，可以触发网站重新部署"
          # 如果需要自动部署，可以在这里添加部署命令
          # 例如：调用Vercel/Netlify的部署hook
